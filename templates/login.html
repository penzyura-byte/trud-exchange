<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход в CRM</title>
  <style>
    :root{
      --bg:#031412;
      --card:#0a2622;
      --line:rgba(144,255,208,.14);
      --text:#eef8f4;
      --muted:#9bbab2;
      --green:#44e39d;
      --red:#ff8d8d;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#031412 0%,#041b18 38%,#02110f 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      padding:16px;
    }
    .card{
      width:min(420px,100%);
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(10,38,34,.94), rgba(6,24,22,.96));
      box-shadow:0 24px 60px rgba(0,0,0,.38);
      padding:24px;
    }
    h1{margin:0 0 8px;font-size:28px}
    .sub{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:18px}
    label{display:block;font-size:13px;color:#b7d0c8;margin:12px 0 8px}
    input,button{
      width:100%;
      font:inherit;
      border-radius:14px;
    }
    input{
      padding:14px;
      border:1px solid rgba(144,255,208,.12);
      background:rgba(8,39,35,.98);
      color:var(--text);
      outline:none;
    }
    button{
      margin-top:16px;
      padding:14px 16px;
      border:0;
      background:linear-gradient(180deg,#57f0ad 0%, #2ccf88 100%);
      color:#052017;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
    }
    .err{
      margin-bottom:12px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,141,141,.08);
      border:1px solid rgba(255,141,141,.18);
      color:#ffd0d0;
    }
    .hint{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      text-align:center;
    }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h1>Вход в CRM</h1>
    <div class="sub">Введите логин и пароль менеджера или администратора.</div>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}

    <label>Логин</label>
    <input name="username" placeholder="{{ admin_username }}" autocomplete="username" required>

    <label>Пароль</label>
    <input name="password" type="password" autocomplete="current-password" required>

    <button type="submit">Войти</button>

    <div class="hint">
      После входа откроется панель заявок, переписка и кнопки управления.
    </div>
  </form>
</body>
</html>
